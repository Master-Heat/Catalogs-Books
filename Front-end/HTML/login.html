<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalogs - Log In</title>
    <link rel="stylesheet" href="../CSS/Shared CSS/shared1.css">
    <link rel="stylesheet" href="../CSS/login.css">
    <link rel="stylesheet" href="../CSS/search.css">
    <script src="../JavaScript/search.js" defer></script>
    <script src="../JavaScript/animations.js" defer></script>
    <script src="../JavaScript/handleLogIn.js" defer></script>
</head>

<body>
    <!-- NAVBAR -->
    <nav class="nav-bar">
        <div class="nav-logo">
            <a href="../HTML/index.html">Catalogs</a>
        </div>

        <div class="nav-search">
            <input type="text" autocomplete="off" placeholder="Search for books..." id="navSearchInput" />
            <span class="search-icon">
                <img src="../assets/Images/Landing Page/Search.svg" alt="search icon">
            </span>
        </div>

        <div class="nav-actions">
            <a href="./login.html" class="btn-login">
                <img src="../assets/Images/Landing Page/LogIn.svg" alt="login icon">
                <span>Log In</span>
            </a>
            <a href="./signup.html" class="btn-signup">
                <img src="../assets/Images/Landing Page/UserPlus.svg" alt="sign up icon">
                <span>Sign Up</span>
            </a>
        </div>

        <button class="hamburger" id="hamburgerBtn" aria-label="Open menu" aria-expanded="false">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </nav>

    <!-- Mobile Menu Overlay -->
    <div class="mobile-menu" id="mobileMenu" aria-hidden="true">
        <a href="./login.html" class="mobile-btn-login">
            <img src="../assets/Images/Landing Page/LogIn.svg" alt="login icon">
            Log In
        </a>
        <a href="./signup.html" class="mobile-btn-signup">
            <img src="../assets/Images/Landing Page/UserPlus.svg" alt="sign up icon">
            Sign Up
        </a>
        <div class="mobile-search">
            <input type="text" autocomplete="off" placeholder="Search for books..." id="mobileSearchInput" />
            <span class="search-icon">
                <img src="../assets/Images/Landing Page/Search.svg" alt="search icon">
            </span>
        </div>
    </div>

    <main class="main-content">
        <div class="signup-card">
            <h2 class="signup-title">Log In</h2>

            <form class="signup-form" action="./homepage.html">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required autocomplete="on">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required autocomplete="on">
                </div>

                <button type="submit" class="btn-signup-submit">Log In</button>
            </form>

            <p class="login-link">
                Don't have an account? <a href="../HTML/signup.html">Sign up</a>
            </p>
        </div>
    </main>

    <!-- FOOTER -->
    <footer>
        <div class="footer-logo">
            <a href="../HTML/index.html">Catalogs</a>
        </div>
        <nav class="footer-links">
            <a>About</a>
            <a>Contact</a>
            <a>Privacy</a>
            <a>Terms</a>
        </nav>
        <span class="footer-copy">&copy; 2026 Catalogs</span>
    </footer>

    <!-- SEARCH OVERLAY -->
    <div class="search-overlay" id="searchOverlay">
        <div class="search-overlay-inner">
            <div class="search-overlay-bar">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8" />
                    <path d="m21 21-4.35-4.35" />
                </svg>
                <input type="text" class="search-overlay-input" id="searchOverlayInput"
                    placeholder="Search for books..." autocomplete="off">
                <button class="search-overlay-close" id="searchOverlayClose">&times;</button>
            </div>
            <p class="search-overlay-info" id="searchOverlayInfo"></p>
            <div class="search-overlay-list" id="searchOverlayList"></div>
        </div>
    </div>
</body>

</html>
