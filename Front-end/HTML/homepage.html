<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalogs - Home Page</title>
    <link rel="stylesheet" href="../CSS/Shared CSS/shared2.css">
    <link rel="stylesheet" href="../CSS/homepage.css">
    <link rel="stylesheet" href="../CSS/search.css">
    <script src="../JavaScript/config.js"></script>
    <script src="../JavaScript/auth-guard.js"></script>
    <script src="../JavaScript/search.js" defer></script>
    <script src="../JavaScript/animations.js" defer></script>
    <script src="../JavaScript/homepage.js" defer></script>
</head>

<body>
    <!-- NAVBAR -->
    <nav class="nav-bar">
        <div class="nav-logo">
            <a href="./homepage.html">Catalogs</a>
        </div>

        <div class="nav-search">
            <input type="text" autocomplete="off" placeholder="Search for books..." id="navSearchInput" />
            <span class="search-icon">
                <img src="../assets/Images/Landing Page/Search.svg" alt="search icon">
            </span>
        </div>

        <div class="nav-actions">
            <a href="./charts.html" class="btn-charts">
                <img src="../assets/Images/Home Page/BarChart3.svg" alt="charts icon">
                <span>Charts</span>
            </a>
            <a href="./aichat.html" class="btn-ai">
                <img src="../assets/Images/Home Page/Sparkles.svg" alt="sparkles icon">
                <span>AI</span>
            </a>
            <a href="./useraccount.html" class="btn-account">
                <img src="../assets/Images/Home Page/User.svg" alt="user icon">
                <span>Account</span>
            </a>
        </div>

        <button class="hamburger" id="hamburgerBtn" aria-label="Open menu" aria-expanded="false">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </nav>

    <!-- Mobile Menu Overlay -->
    <div class="mobile-menu" id="mobileMenu" aria-hidden="true">
        <a href="./charts.html" class="mobile-btn-charts">
            <img src="../assets/Images/Home Page/BarChart3.svg" alt="charts icon">
            Charts
        </a>
        <a href="./aichat.html" class="mobile-btn-ai">
            <img src="../assets/Images/Home Page/Sparkles.svg" alt="sparkles icon">
            AI
        </a>
        <a href="./useraccount.html" class="mobile-btn-account">
            <img src="../assets/Images/Home Page/User.svg" alt="user icon">
            Account
        </a>
        <div class="mobile-search">
            <input type="text" autocomplete="off" placeholder="Search for books..." id="mobileSearchInput" />
            <span class="search-icon">
                <img src="../assets/Images/Landing Page/Search.svg" alt="search icon">
            </span>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <main class="main-content">

    </main>

    <!-- FOOTER -->
    <footer>
        <div class="footer-logo">
            <a href="#">Catalogs</a>
        </div>
        <nav class="footer-links">
            <a href="#">About</a>
            <a href="#">Contact</a>
            <a href="#">Privacy</a>
            <a href="#">Terms</a>
        </nav>
        <span class="footer-copy">&copy; 2026 Catalogs</span>
    </footer>

    <!-- SEARCH OVERLAY -->
    <div class="search-overlay" id="searchOverlay">
        <div class="search-overlay-inner">
            <div class="search-overlay-bar">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8" />
                    <path d="m21 21-4.35-4.35" />
                </svg>
                <input type="text" class="search-overlay-input" id="searchOverlayInput"
                    placeholder="Search for books..." autocomplete="off">
                <button class="search-overlay-close" id="searchOverlayClose">&times;</button>
            </div>
            <p class="search-overlay-info" id="searchOverlayInfo"></p>
            <div class="search-overlay-list" id="searchOverlayList"></div>
        </div>
    </div>
</body>

</html>
